<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#d9d9de">
<meta name="description" content="Korean Presbyterian Church Kitchen Renovation Cost Simulator & Presentation">
<link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🍳</text></svg>'>
<title>KPC Kitchen Renovation — 임시집사회 보고</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/theme.css?v=2">
<link rel="stylesheet" href="css/layout.css?v=2">
<link rel="stylesheet" href="css/components.css?v=2">
<link rel="stylesheet" href="css/briefing-board.css?v=2">
<style>
  /* Guaranteed margin to prevent header overlap, bypassing any CSS file caching */
  body:not(.is-intro) #app-dynamic,
  body:not(.is-intro) #app-polycam,
  body:not(.is-intro) #app-enscape {
    margin-top: 140px !important;
  }
  @media(max-width:900px) {
    body:not(.is-intro) #app-dynamic,
    body:not(.is-intro) #app-polycam,
    body:not(.is-intro) #app-enscape {
      margin-top: 110px !important;
    }
  }
</style>
</head>
<body class="theme-flat2d">

<!-- SPLASH SCREEN -->
<div id="splash" onclick="enterApp()">
  <div class="sp-line sp-t1"><span>한인장로교회 &middot; 세인트루이스</span></div>
  <div class="sp-line sp-t2"><span>주방 리노베이션</span></div>
  <div class="sp-line sp-t3"><span>임시집사회 보고</span></div>
  <div class="sp-enter"><span>화면을 클릭하세요</span></div>
  <div class="sp-bar"></div>
</div>

<div class="header PresentationShell"><div class="header-in">
<div class="header-left"><h1 id="hdr-title">한인장로교회</h1>
<p id="hdr-sub">주방 리노베이션 · 비용 시뮬레이터</p></div>
<div class="header-tabs" id="header-tabs" role="tablist" aria-label="Main Navigation"></div>
<button class="lang-btn LanguageToggle" id="lang-btn" onclick="toggleLang()">English</button>
</div></div>
<main class="container PresentationShell" id="app" role="main">
  <div id="app-dynamic"></div>
  <div id="app-polycam" style="display:none;"></div>
  <div id="app-enscape" style="display:none;"></div>
</main>
<div id="pres-root"></div>
<div id="print-overlay"></div>
<div class="lb-overlay" id="lb">
  <div class="lb-top">
    <span class="lb-title" id="lb-title"></span>
    <div class="lb-controls">
      <button class="lb-btn" onclick="lbZoom(0.8)">&minus;</button>
      <span class="lb-zoom-label" id="lb-zoom">100%</span>
      <button class="lb-btn" onclick="lbZoom(1.25)">+</button>
      <button class="lb-btn" onclick="lbReset()">Reset</button>
      <button class="lb-btn lb-close" onclick="lbClose()">&times;</button>
    </div>
  </div>
  <div class="lb-stage" id="lb-stage" onwheel="lbWheel(event)">
    <button class="lb-nav lb-prev" onclick="lbNav(-1)">&#8249;</button>
    <img id="lb-img" src="" alt="" draggable="false">
    <button class="lb-nav lb-next" onclick="lbNav(1)">&#8250;</button>
  </div>
  <div class="lb-caption" id="lb-cap"></div>
</div>

<!-- JS modules loaded in dependency order -->
<script src="js/data.js"></script>
<script src="js/state.js"></script>
<script src="js/panels.js"></script>
<script src="js/interactions.js"></script>
<script src="js/render.js"></script>
</body>
</html>
